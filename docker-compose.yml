version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pixelmage-mssql
    ports:
      - '1434:1433' # Map port 1434 of host to 1433 of container
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: 'PixelMage@2026' # Must match DB_PASSWORD in .env
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pixelmage-mssql-init
    depends_on:
      - sqlserver
    command: >
      /bin/bash -c "
        echo 'Waiting for SQL Server to warm up...';
        sleep 15;
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'PixelMage@2026' -No -Q \"IF NOT EXISTS(SELECT * FROM sys.databases WHERE name = 'ExeProject') CREATE DATABASE ExeProject;\"
        echo 'Database initialization script completed.';
      "

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: pixelmage-n8n
    ports:
      - '5678:5678'
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
    volumes:
      - n8n-data:/home/node/.n8n
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: pixelmage-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mssql-data:
  redis-data:
  n8n-data:
